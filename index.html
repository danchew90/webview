<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RN WebView Bridge Demo</title>
    <style>
      :root {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        color: #222;
        background: #f3f5f7;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 16px;
      }
      .card {
        max-width: 920px;
        margin: 0 auto;
        background: #fff;
        border-radius: 14px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        padding: 20px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 22px;
      }
      .desc {
        color: #5f6368;
        margin-bottom: 16px;
        line-height: 1.5;
      }
      .section {
        border: 1px solid #e4e7eb;
        border-radius: 10px;
        padding: 14px;
        margin-bottom: 12px;
      }
      .section h2 {
        margin: 0 0 10px;
        font-size: 15px;
      }
      .row {
        display: flex;
        gap: 10px;
      }
      @media (max-width: 720px) {
        .row {
          flex-direction: column;
        }
      }
      input {
        flex: 1;
        border: 1px solid #c9cdd3;
        border-radius: 8px;
        padding: 10px 12px;
        font-size: 14px;
      }
      button {
        border: 0;
        border-radius: 8px;
        padding: 10px 14px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        white-space: nowrap;
      }
      #sendToRN {
        background: #4caf50;
        color: #fff;
      }
      #sendUrlToRN {
        background: #ff9800;
        color: #fff;
      }
      #simulateFromRN {
        background: #2196f3;
        color: #fff;
      }
      ul {
        margin: 0;
        padding: 0;
        list-style: none;
        max-height: 340px;
        overflow: auto;
      }
      li {
        border-left: 4px solid #ddd;
        background: #fafbfc;
        border-radius: 8px;
        padding: 10px;
        margin-bottom: 8px;
      }
      .meta {
        font-size: 12px;
        font-weight: 700;
        margin-bottom: 4px;
      }
      .rn-to-web {
        color: #2196f3;
      }
      .web-to-rn {
        color: #4caf50;
      }
      .url-to-rn {
        color: #fb8c00;
      }
      code {
        background: #eef1f4;
        border-radius: 6px;
        padding: 2px 6px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>RN ↔ WebView 통신 페이지</h1>
      <p class="desc">
        Expo React Native WebView와 postMessage 통신 확인용 페이지입니다. RN에서는
        <code>WebView.postMessage()</code>, 웹에서는
        <code>window.ReactNativeWebView.postMessage()</code>를 사용합니다.
      </p>

      <section class="section">
        <h2>WEB → RN 일반 메시지</h2>
        <div class="row">
          <input id="webMessage" placeholder="RN으로 보낼 메시지 입력" />
          <button id="sendToRN">RN으로 전송</button>
        </div>
      </section>

      <section class="section">
        <h2>WEB → RN URL 타입 전송 (type: "URL")</h2>
        <div class="row">
          <input id="urlMessage" placeholder="https://example.com" value="https://naver.com" />
          <button id="sendUrlToRN">URL 전송</button>
        </div>
      </section>

      <section class="section">
        <h2>테스트: RN 메시지 수신 시뮬레이션</h2>
        <div class="row">
          <button id="simulateFromRN">RN → WEB 이벤트 흉내내기</button>
        </div>
      </section>

      <section class="section">
        <h2>메시지 로그</h2>
        <ul id="logList"></ul>
      </section>
    </main>

    <script>
      const $ = (id) => document.getElementById(id);
      const logList = $('logList');

      function addLog(direction, message, className) {
        const li = document.createElement('li');
        const now = new Date().toLocaleTimeString();
        li.innerHTML = `<div class="meta ${className}">${direction} · ${now}</div><div>${message}</div>`;
        logList.prepend(li);
      }

      function parseMaybeJson(raw) {
        try {
          return JSON.parse(raw);
        } catch {
          return raw;
        }
      }

      function postToRN(payload, label, className) {
        if (!window.ReactNativeWebView?.postMessage) {
          addLog(label, 'ReactNativeWebView 객체가 없어 전송 실패 (브라우저 단독 실행 중)', className);
          return;
        }

        window.ReactNativeWebView.postMessage(JSON.stringify(payload));
        addLog(label, JSON.stringify(payload), className);
      }

      $('sendToRN').addEventListener('click', () => {
        const text = $('webMessage').value.trim();
        if (!text) return;

        const payload = {
          type: 'FROM_WEB',
          message: text,
          timestamp: new Date().toLocaleTimeString(),
        };

        postToRN(payload, 'WEB → RN', 'web-to-rn');
        $('webMessage').value = '';
      });

      $('sendUrlToRN').addEventListener('click', () => {
        const url = $('urlMessage').value.trim();
        if (!url) return;

        const payload = {
          type: 'URL',
          url,
          timestamp: new Date().toLocaleTimeString(),
        };

        postToRN(payload, 'WEB → RN (URL)', 'url-to-rn');
      });

      function onRNMessage(event) {
        const parsed = parseMaybeJson(event.data);

        if (typeof parsed === 'object' && parsed !== null) {
          const msg = parsed.message ?? parsed.url ?? JSON.stringify(parsed);
          addLog('RN → WEB', msg, 'rn-to-web');
          return;
        }

        addLog('RN → WEB', String(parsed), 'rn-to-web');
      }

      window.addEventListener('message', onRNMessage);
      document.addEventListener('message', onRNMessage);

      $('simulateFromRN').addEventListener('click', () => {
        const simulated = {
          type: 'FROM_RN',
          message: '시뮬레이터에서 보낸 테스트 메시지',
          timestamp: new Date().toLocaleTimeString(),
        };
        onRNMessage({ data: JSON.stringify(simulated) });
      });
    </script>
  </body>
</html>
